
; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio] ; глобальные параметры
description = "Hello World Example"

[env]
test_framework = custom ;
platform = native ; ПО для хост-компьютера
build_flags = -O0
    -std=c11    ;
    -Wall       ;
; debug_test = native/test_dynlist ; тестируем дин список
debug_test = native/test_stack ; тестируем стэк


[env:helloworld]
build_type = debug ;
build_src_filter = +<helloworld/*.c> ;
check_tool = cppcheck
check_flags = cppcheck:--enable=all
    --suppress=unusedFunction
    --suppress=unmatchedSuppression
check_src_filters =
    +<src/helloworld/*.c>
    +<lib/dynlist/src/*.c>
    +<test/test_dynlist/*.c>
    