; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



; ============================================
; Общие настройки для всех сред
; ============================================
[env]
platform = ststm32
framework = cmsis
build_type = debug 

; ============================================
; STM32H745ZI (Nucleo-H745ZI-Q)
; ============================================
[env:nucleo_h745zi_q]
board = nucleo_h745zi_q
build_flags = -std=c11 -Wall -Wextra -D CORE_CM7
board_build.ldscript = $PROJECT_DIR/system_745/h745cm7_flash.ld

; ; ; ============================================
; ; STM32F401RCT6 (Generic / Custom Board)
; ; ============================================
[env:genericSTM32F401RCT6]
board = genericSTM32F401RC
build_flags = -std=c11 -Wall -Wextra -D CORE_CM4
board_build.ldscript = $PROJECT_DIR/system_401/f401cm4_flash.ld
; upload_protocol = stlink


; Add The following lines of code to your project's platformio.ini file.
upload_protocol = stlink

upload_flags = -c set CPUTAPID 0            ; Allow Original and Clone STM32 to be detected by OpenOCD debugger.
debug_build_flags = -O0 -ggdb3              ; Apply no optimization to the code written.
;debug_init_break = tbreak Reset_Handler    ; Uncomment to activate: Adds a break point in the reset handler.


; ============ Enable Arm Semihosting in debugger to show logs =============

; Add The following code lines to enable semihosting feature.
; To disable semihosting please comment all of the following code lines by adding semicolon ";" before each one:

extra_scripts = extra_script.py              ; The "extra_script.py" file must be located in the main project folder
build_unflags =
    --specs=nosys.specs 
    -lnosys
debug_extra_cmds =
    monitor arm semihosting enable
debug_tool = stlink ; для отладки
debug_port = :3333


[genericSTM32F401RCT6:hello_led]
debug_test = native/test_dynlist
board_build.cmsis.startup_file = broken_path
board_build.cmsis.system_file = broken_path
build_src_filter = 
    +<$PROJECT_DIR/system_401/*.c>
    +<$PROJECT_DIR/system_401/*.s> 
    +<$PROJECT_DIR/src/*.c>
    +<$PROJECT_DIR/lib/*.c>

[nucleo_h745zi_q:hello_led]
board_build.cmsis.startup_file = broken_path
board_build.cmsis.system_file = broken_path
build_src_filter = 
    +<$PROJECT_DIR/system_745/*.c>
    +<$PROJECT_DIR/system_745/*.s> 
    +<$PROJECT_DIR/src/*.c>
    +<$PROJECT_DIR/lib/*.c>


